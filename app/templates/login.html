<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StockOS — Sign in</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0c0c0e; --bg2: #131316; --bg3: #1a1a1f; --bg4: #22222a;
      --border: rgba(255,255,255,0.07); --border-hover: rgba(255,255,255,0.15);
      --text: #f0ede8; --text2: #8a8890; --text3: #55535d;
      --accent: #d4f564; --accent2: #a8e040;
      --accent-dim: rgba(212,245,100,0.1); --accent-dim2: rgba(212,245,100,0.04);
      --red: #ff6b6b; --red-dim: rgba(255,107,107,0.12);
      --font-head: 'Syne', sans-serif; --font-body: 'DM Sans', sans-serif; --font-mono: 'DM Mono', monospace;
    }
    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--font-body); }

    /* grid bg */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image: linear-gradient(rgba(212,245,100,0.025) 1px, transparent 1px),
                        linear-gradient(90deg, rgba(212,245,100,0.025) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
    }

    .page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .box {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 36px;
      width: 100%;
      max-width: 400px;
      position: relative;
    }

    .brand {
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 28px;
    }
    .brand-icon {
      width: 32px; height: 32px;
      background: var(--accent);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-family: var(--font-mono); font-weight: 500; font-size: 15px; color: #0c0c0e;
    }
    .brand-name { font-family: var(--font-head); font-weight: 700; font-size: 16px; }

    .tabs {
      display: flex;
      background: var(--bg3);
      border-radius: 9px;
      padding: 3px;
      margin-bottom: 24px;
    }
    .tab {
      flex: 1; text-align: center;
      padding: 7px;
      border-radius: 7px;
      font-size: 13.5px;
      font-weight: 500;
      cursor: pointer;
      color: var(--text3);
      transition: all 0.2s;
      border: none; background: none; font-family: var(--font-body);
    }
    .tab.active { background: var(--bg2); color: var(--text); box-shadow: 0 1px 4px rgba(0,0,0,0.3); }

    .form-group { margin-bottom: 14px; }
    .form-label {
      display: block; font-size: 11.5px; font-weight: 500;
      letter-spacing: 0.08em; text-transform: uppercase;
      color: var(--text3); font-family: var(--font-mono); margin-bottom: 6px;
    }
    .form-input {
      width: 100%; background: var(--bg3); border: 1px solid var(--border);
      border-radius: 8px; padding: 10px 13px; font-family: var(--font-body);
      font-size: 14px; color: var(--text); outline: none; transition: border-color 0.15s;
    }
    .form-input::placeholder { color: var(--text3); }
    .form-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-dim2); }

    .submit-btn {
      width: 100%; padding: 11px;
      background: var(--accent); color: #0c0c0e;
      border: none; border-radius: 9px;
      font-family: var(--font-head); font-size: 14.5px; font-weight: 700;
      cursor: pointer; margin-top: 6px;
      transition: background 0.15s, transform 0.15s;
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .submit-btn:hover { background: var(--accent2); transform: translateY(-1px); }
    .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    .err-box {
      display: none; margin-bottom: 14px;
      background: var(--red-dim); border: 1px solid rgba(255,107,107,0.2);
      border-radius: 8px; padding: 9px 13px;
      font-size: 13px; color: var(--red);
    }
    .err-box.show { display: block; }

    .spinner {
      width: 15px; height: 15px; border: 2px solid rgba(12,12,14,0.3);
      border-top-color: #0c0c0e; border-radius: 50%;
      animation: spin 0.6s linear infinite; display: none;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
<div class="page">
  <div class="box">
    <div class="brand">
      <div class="brand-icon">S</div>
      <span class="brand-name">StockOS</span>
    </div>

    <div class="tabs">
      <button class="tab active" id="tab-login" onclick="switchTab('login')">Sign in</button>
      <button class="tab" id="tab-signup" onclick="switchTab('signup')">Create account</button>
      <button class="tab" id="tab-forgot" onclick="switchTab('forgot')">Forgot password</button>
    </div>

    <div id="err-box" class="err-box"></div>

    <!-- Login form -->
    <div id="form-login">
      <div class="form-group">
        <label class="form-label">Email</label>
        <input class="form-input" type="email" id="login-email" placeholder="you@company.com" autocomplete="email">
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input class="form-input" type="password" id="login-password" placeholder="••••••••" autocomplete="current-password">
      </div>
      <button class="submit-btn" id="login-btn" onclick="doLogin()">
        <span>Sign in</span>
        <div class="spinner" id="login-spinner"></div>
      </button>
    </div>

    <!-- Signup form -->
    <div id="form-signup" style="display:none">
      <div class="form-group">
        <label class="form-label">Email</label>
        <input class="form-input" type="email" id="signup-email" placeholder="you@company.com">
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input class="form-input" type="password" id="signup-password" placeholder="Min. 8 characters">
      </div>
      <button class="submit-btn" id="signup-btn" onclick="doSignup()">
        <span>Create account</span>
        <div class="spinner" id="signup-spinner"></div>
      </button>
    </div>

    <!-- Forgot Password form -->
    <div id="form-forgot" style="display:none">
      <p style="font-size:13px; color:var(--text2); margin-bottom:16px; line-height:1.5;">
        Enter your email and we'll send you a link to reset your password.
      </p>
      <div class="form-group">
        <label class="form-label">Email</label>
        <input class="form-input" type="email" id="forgot-email" placeholder="you@company.com" autocomplete="email">
      </div>
      <div class="form-group">
        <label class="form-label">New Password</label>
        <input class="form-input" type="password" id="forgot-password" placeholder="Min. 8 characters">
      </div>
      <button class="submit-btn" id="forgot-btn" onclick="doForgotPassword()">
        <span>Reset password</span>
        <div class="spinner" id="forgot-spinner"></div>
      </button>
    </div>
  </div>
</div>

<script>
// Determine API URL - use current origin if available, fallback to localhost
const API = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1' 
  ? `http://127.0.0.1:8000`
  : window.location.origin;

// Redirect if already logged in
if (localStorage.getItem('token')) location.href = '/ui/dashboard';

function switchTab(t) {
  const forms = ['login', 'signup', 'forgot'];
  const tabs = ['tab-login', 'tab-signup', 'tab-forgot'];
  
  forms.forEach(form => {
    document.getElementById('form-' + form).style.display = form === t ? '' : 'none';
  });
  
  tabs.forEach(tab => {
    document.getElementById(tab).classList.toggle('active', tab === 'tab-' + t);
  });
  
  hideErr();
}

function showErr(msg) {
  const el = document.getElementById('err-box');
  el.textContent = msg; el.classList.add('show');
}
function hideErr() { document.getElementById('err-box').classList.remove('show'); }

function setLoading(id, on) {
  document.getElementById(id + '-btn').disabled = on;
  document.getElementById(id + '-spinner').style.display = on ? 'inline-block' : 'none';
}

async function doLogin() {
  hideErr();
  const email = document.getElementById('login-email').value.trim();
  const password = document.getElementById('login-password').value;
  if (!email || !password) { showErr('Please fill in all fields.'); return; }
  setLoading('login', true);
  try {
    const res = await fetch(API + '/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username: email, password })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.detail || 'Login failed');
    localStorage.setItem('token', data.access_token);
    localStorage.setItem('user_email', email);
    location.href = '/ui/dashboard';
  } catch(e) { showErr(e.message); setLoading('login', false); }
}

async function doSignup() {
  hideErr();
  const email = document.getElementById('signup-email').value.trim();
  const password = document.getElementById('signup-password').value;
  if (!email || !password) { showErr('Please fill in all fields.'); return; }
  if (password.length < 8) { showErr('Password must be at least 8 characters.'); return; }
  setLoading('signup', true);
  try {
    const res = await fetch(API + '/auth/signup', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username: email, password })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.detail || 'Signup failed');
    // auto-login
    const loginRes = await fetch(API + '/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username: email, password })
    });
    const loginData = await loginRes.json();
    if (loginRes.ok) {
      localStorage.setItem('token', loginData.access_token);
      localStorage.setItem('user_email', email);
      location.href = '/ui/dashboard';
    } else {
      switchTab('login');
    }
  } catch(e) { showErr(e.message); setLoading('signup', false); }
}

async function doForgotPassword() {
  hideErr();
  const email = document.getElementById('forgot-email').value.trim();
  const newPassword = document.getElementById('forgot-password').value;
  if (!email || !newPassword) { showErr('Please fill in all fields.'); return; }
  if (newPassword.length < 8) { showErr('Password must be at least 8 characters.'); return; }
  setLoading('forgot', true);
  try {
    const res = await fetch(API + '/auth/forgot-password', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username: email, new_password: newPassword })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.detail || 'Password reset failed');
    showErr('');
    alert('Password reset successfully! Please sign in with your new password.');
    switchTab('login');
  } catch(e) { showErr(e.message); setLoading('forgot', false); }
}

// Enter key support
document.addEventListener('keydown', e => {
  if (e.key !== 'Enter') return;
  const loginVisible = document.getElementById('form-login').style.display !== 'none';
  const signupVisible = document.getElementById('form-signup').style.display !== 'none';
  const forgotVisible = document.getElementById('form-forgot').style.display !== 'none';
  
  if (loginVisible) doLogin();
  else if (signupVisible) doSignup();
  else if (forgotVisible) doForgotPassword();
});
</script>
</body>
</html>
