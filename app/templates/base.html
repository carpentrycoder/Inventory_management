<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Inventory{% endblock %} — StockOS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0c0c0e;
      --bg2: #131316;
      --bg3: #1a1a1f;
      --bg4: #22222a;
      --border: rgba(255,255,255,0.07);
      --border-hover: rgba(255,255,255,0.15);
      --text: #f0ede8;
      --text2: #8a8890;
      --text3: #55535d;
      --accent: #d4f564;
      --accent2: #a8e040;
      --accent-dim: rgba(212,245,100,0.1);
      --accent-dim2: rgba(212,245,100,0.04);
      --red: #ff6b6b;
      --red-dim: rgba(255,107,107,0.12);
      --blue: #6bb5ff;
      --blue-dim: rgba(107,181,255,0.1);
      --amber: #ffbb55;
      --amber-dim: rgba(255,187,85,0.1);
      --radius: 10px;
      --radius-lg: 16px;
      --sidebar-w: 220px;
      --font-head: 'Syne', sans-serif;
      --font-body: 'DM Sans', sans-serif;
      --font-mono: 'DM Mono', monospace;
    }

    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--font-body); font-size: 14px; line-height: 1.6; }

    /* ── Layout ─────────────────────────────────── */
    .shell { display: flex; min-height: 100vh; }

    .sidebar {
      width: var(--sidebar-w);
      background: var(--bg2);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      position: fixed;
      top: 0; left: 0; bottom: 0;
      z-index: 100;
    }

    .sidebar-brand {
      padding: 24px 20px 20px;
      border-bottom: 1px solid var(--border);
    }
    .brand-mark {
      display: inline-flex;
      align-items: center;
      gap: 9px;
      text-decoration: none;
    }
    .brand-icon {
      width: 28px; height: 28px;
      background: var(--accent);
      border-radius: 7px;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; font-family: var(--font-mono); font-weight: 500;
      color: #0c0c0e;
    }
    .brand-name {
      font-family: var(--font-head);
      font-weight: 700;
      font-size: 15px;
      color: var(--text);
      letter-spacing: 0.01em;
    }

    .sidebar-nav { flex: 1; padding: 14px 12px; overflow-y: auto; }

    .nav-section-label {
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text3);
      padding: 6px 8px 4px;
      font-family: var(--font-mono);
    }

    .nav-link {
      display: flex;
      align-items: center;
      gap: 9px;
      padding: 8px 10px;
      border-radius: 8px;
      text-decoration: none;
      color: var(--text2);
      font-size: 13.5px;
      font-weight: 400;
      margin-bottom: 1px;
      transition: background 0.15s, color 0.15s;
    }
    .nav-link:hover { background: var(--bg3); color: var(--text); }
    .nav-link.active { background: var(--accent-dim); color: var(--accent); }
    .nav-link .nav-icon {
      width: 16px; height: 16px;
      opacity: 0.7;
      flex-shrink: 0;
    }
    .nav-link.active .nav-icon { opacity: 1; }

    .sidebar-footer {
      padding: 14px 12px;
      border-top: 1px solid var(--border);
    }
    .user-chip {
      display: flex; align-items: center; gap: 9px;
      padding: 8px 10px;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.15s;
    }
    .user-chip:hover { background: var(--bg3); }
    .user-avatar {
      width: 26px; height: 26px;
      background: var(--bg4);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--accent);
    }
    .user-name { font-size: 13px; color: var(--text2); flex: 1; }
    .logout-btn {
      font-size: 12px;
      color: var(--text3);
      background: none; border: none; cursor: pointer;
      font-family: var(--font-mono);
    }
    .logout-btn:hover { color: var(--red); }

    /* ── Main ───────────────────────────────────── */
    .main {
      margin-left: var(--sidebar-w);
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    .topbar {
      padding: 18px 32px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 16px;
      position: sticky;
      top: 0;
      background: var(--bg);
      z-index: 50;
      backdrop-filter: blur(8px);
    }
    .page-title {
      font-family: var(--font-head);
      font-size: 18px;
      font-weight: 700;
      color: var(--text);
      flex: 1;
    }

    .content { padding: 28px 32px; }

    /* ── Components ─────────────────────────────── */
    .btn {
      display: inline-flex; align-items: center; gap: 7px;
      padding: 8px 16px;
      border-radius: 8px;
      font-family: var(--font-body);
      font-size: 13.5px;
      font-weight: 500;
      cursor: pointer;
      border: none;
      transition: all 0.15s;
      text-decoration: none;
      white-space: nowrap;
    }
    .btn-primary {
      background: var(--accent);
      color: #0c0c0e;
    }
    .btn-primary:hover { background: var(--accent2); transform: translateY(-1px); }
    .btn-ghost {
      background: transparent;
      color: var(--text2);
      border: 1px solid var(--border);
    }
    .btn-ghost:hover { border-color: var(--border-hover); color: var(--text); background: var(--bg3); }
    .btn-danger {
      background: var(--red-dim);
      color: var(--red);
      border: 1px solid transparent;
    }
    .btn-danger:hover { background: rgba(255,107,107,0.2); }
    .btn-sm { padding: 5px 11px; font-size: 12.5px; border-radius: 6px; }

    .card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 20px;
    }

    .badge {
      display: inline-flex; align-items: center;
      padding: 2px 8px;
      border-radius: 20px;
      font-size: 11px;
      font-family: var(--font-mono);
      font-weight: 500;
    }
    .badge-green { background: rgba(212,245,100,0.12); color: var(--accent); }
    .badge-red   { background: var(--red-dim); color: var(--red); }
    .badge-blue  { background: var(--blue-dim); color: var(--blue); }
    .badge-amber { background: var(--amber-dim); color: var(--amber); }

    /* ── Table ──────────────────────────────────── */
    .table-wrap {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      overflow: hidden;
    }
    .table-header {
      padding: 14px 20px;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 12px;
    }
    table { width: 100%; border-collapse: collapse; }
    thead th {
      text-align: left;
      padding: 10px 16px;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text3);
      font-family: var(--font-mono);
      border-bottom: 1px solid var(--border);
      background: var(--bg3);
    }
    tbody tr { transition: background 0.1s; }
    tbody tr:hover { background: rgba(255,255,255,0.02); }
    tbody tr:not(:last-child) td { border-bottom: 1px solid var(--border); }
    tbody td {
      padding: 11px 16px;
      font-size: 13.5px;
      color: var(--text2);
      vertical-align: middle;
    }
    tbody td:first-child { color: var(--text); font-weight: 400; }

    /* ── Form ───────────────────────────────────── */
    .form-group { margin-bottom: 16px; }
    .form-label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--text3);
      font-family: var(--font-mono);
      margin-bottom: 6px;
    }
    .form-input, .form-select {
      width: 100%;
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 9px 12px;
      font-family: var(--font-body);
      font-size: 14px;
      color: var(--text);
      outline: none;
      transition: border-color 0.15s;
    }
    .form-input::placeholder { color: var(--text3); }
    .form-input:focus, .form-select:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-dim2); }
    .form-select option { background: var(--bg3); }

    /* ── Modal ──────────────────────────────────── */
    .modal-overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.6);
      z-index: 200;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(4px);
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: var(--bg2);
      border: 1px solid var(--border-hover);
      border-radius: var(--radius-lg);
      padding: 28px;
      width: 100%;
      max-width: 440px;
      margin: 16px;
      animation: modal-in 0.2s ease;
    }
    @keyframes modal-in { from { transform: translateY(10px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    .modal-title {
      font-family: var(--font-head);
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 20px;
    }
    .modal-footer { margin-top: 20px; display: flex; gap: 10px; justify-content: flex-end; }

    /* ── Toast ──────────────────────────────────── */
    #toast-container {
      position: fixed; bottom: 24px; right: 24px;
      display: flex; flex-direction: column; gap: 8px;
      z-index: 1000;
    }
    .toast {
      padding: 11px 16px;
      border-radius: 9px;
      font-size: 13.5px;
      font-weight: 500;
      animation: toast-in 0.25s ease;
      box-shadow: 0 4px 16px rgba(0,0,0,0.4);
    }
    .toast-success { background: #1a2e0a; color: var(--accent); border: 1px solid rgba(212,245,100,0.2); }
    .toast-error   { background: #2e0a0a; color: var(--red); border: 1px solid rgba(255,107,107,0.2); }
    @keyframes toast-in { from { transform: translateX(20px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

    /* ── Loader ─────────────────────────────────── */
    .spinner {
      width: 16px; height: 16px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      display: inline-block;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-state { display: flex; align-items: center; justify-content: center; padding: 48px; gap: 10px; color: var(--text3); }

    /* ── Empty state ────────────────────────────── */
    .empty-state { text-align: center; padding: 56px 24px; color: var(--text3); }
    .empty-state p { margin-top: 8px; font-size: 13px; }

    /* ── Search input ───────────────────────────── */
    .search-wrap { position: relative; }
    .search-wrap svg { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: var(--text3); }
    .search-input {
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 7px 12px 7px 32px;
      font-family: var(--font-body);
      font-size: 13.5px;
      color: var(--text);
      outline: none;
      width: 220px;
      transition: border-color 0.15s, width 0.2s;
    }
    .search-input::placeholder { color: var(--text3); }
    .search-input:focus { border-color: var(--accent); width: 260px; }

    /* ── Grid ───────────────────────────────────── */
    .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 16px; }
  </style>
  {% block head %}{% endblock %}
</head>
<body>
<div class="shell">

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-brand">
      <a href="/ui/dashboard" class="brand-mark">
        <span class="brand-icon">S</span>
        <span class="brand-name">StockOS</span>
      </a>
    </div>
    <nav class="sidebar-nav">
      <div class="nav-section-label">Main</div>
      <a href="/ui/dashboard" class="nav-link {% if active == 'dashboard' %}active{% endif %}">
        <svg class="nav-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
          <rect x="1" y="1" width="6" height="6" rx="1.5"/><rect x="9" y="1" width="6" height="6" rx="1.5"/>
          <rect x="1" y="9" width="6" height="6" rx="1.5"/><rect x="9" y="9" width="6" height="6" rx="1.5"/>
        </svg>
        Dashboard
      </a>
      <a href="/ui/reports" class="nav-link {% if active == 'reports' %}active{% endif %}">
        <svg class="nav-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M2 3h12l-1 9H3L2 3z"/><path d="M1 3h14M9 11v4a1 1 0 0 1-1 1H6a1 1 0 0 1-1-1v-4"/>
          <path d="M5 7h6"/>
        </svg>
        Reports
      </a>
      <div class="nav-section-label" style="margin-top:10px">Inventory</div>
      <a href="/ui/items" class="nav-link {% if active == 'items' %}active{% endif %}">
        <svg class="nav-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M2 4.5L8 2l6 2.5v7L8 14 2 11.5v-7z"/><path d="M8 2v12M2 4.5l6 2.5 6-2.5"/>
        </svg>
        Items
      </a>
      <a href="/ui/categories" class="nav-link {% if active == 'categories' %}active{% endif %}">
        <svg class="nav-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M1.5 4h13M1.5 8h9M1.5 12h11"/>
        </svg>
        Categories
      </a>
      <a href="/ui/suppliers" class="nav-link {% if active == 'suppliers' %}active{% endif %}">
        <svg class="nav-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
          <circle cx="5" cy="6" r="2.5"/><circle cx="11" cy="6" r="2.5"/>
          <path d="M1 14c0-2.5 1.8-4 4-4 1 0 1.9.4 2.6 1M8.5 13c.7-1.5 2.2-2 3.5-2 2.2 0 4 1.5 4 4"/>
        </svg>
        Suppliers
      </a>
    </nav>
    <div class="sidebar-footer">
      <div class="user-chip">
        <div class="user-avatar" id="user-initials">—</div>
        <span class="user-name" id="user-email-display">Loading…</span>
        <button class="logout-btn" onclick="logout()">out</button>
      </div>
    </div>
  </aside>

  <!-- Main content -->
  <div class="main">
    <header class="topbar">
      <h1 class="page-title">{% block page_title %}{% endblock %}</h1>
      {% block topbar_actions %}{% endblock %}
    </header>
    <main class="content">
      {% block content %}{% endblock %}
    </main>
  </div>

</div>

<!-- Toast container -->
<div id="toast-container"></div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
// Determine API URL - use current origin if available, fallback to configured host
const API = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1' 
  ? `http://127.0.0.1:8000`
  : window.location.origin;

function getToken() { return localStorage.getItem('token'); }
function getEmail() { return localStorage.getItem('user_email') || ''; }

function authHeader() {
  const t = getToken();
  return t ? { 'Authorization': 'Bearer ' + t } : {};
}

async function apiFetch(path, opts = {}) {
  const res = await fetch(API + path, {
    ...opts,
    headers: {
      'Content-Type': 'application/json',
      ...authHeader(),
      ...(opts.headers || {}),
    }
  });
  if (res.status === 401) { logout(); return null; }
  if (!res.ok) {
    const err = await res.json().catch(() => ({ detail: 'Request failed' }));
    throw new Error(err.detail || 'Request failed');
  }
  return res.status === 204 ? null : res.json();
}

function toast(msg, type = 'success') {
  const el = document.createElement('div');
  el.className = `toast toast-${type}`;
  el.textContent = msg;
  document.getElementById('toast-container').append(el);
  setTimeout(() => el.remove(), 3200);
}

function logout() {
  localStorage.removeItem('token');
  localStorage.removeItem('user_email');
  location.href = '/ui/login';
}

// Guard + user display
(function() {
  if (!getToken()) { location.href = '/ui/login'; return; }
  const email = getEmail();
  const initials = email ? email.slice(0, 2).toUpperCase() : '?';
  document.getElementById('user-initials').textContent = initials;
  document.getElementById('user-email-display').textContent = email || 'User';
})();
</script>
{% block scripts %}{% endblock %}
</body>
</html>
